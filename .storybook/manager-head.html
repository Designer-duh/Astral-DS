<style>
  /* ── All sidebar SVG icons → brand green ── */
  #root svg {
    color: #00AE35 !important;
  }

  /* ── Selected icon → white ── */
  #root [data-selected="true"] svg {
    color: #ffffff !important;
  }

  /* ── Selected state — rounded corners, no stroke ── */
  #root [data-selected="true"] > a {
    border-radius: 6px !important;
    outline: none !important;
    box-shadow: none !important;
    border: none !important;
  }

  /* ── Hover state → very soft green tint, no strokes anywhere ── */
  #root [data-selected]:not([data-selected="true"]) > a:hover,
  #root a[href*="?path="]:hover,
  #root a[href*="?path="]:hover *,
  #root [data-selected]:not([data-selected="true"]) > a:hover *,
  #root li:has(a[href*="?path="]:hover),
  #root li:has(a[href*="?path="]:hover) * {
    background-color: #F2F7F4 !important;
    color: #191919 !important;
    border-radius: 6px !important;
    border: 0 none #F2F7F4 !important;
    border-top: 0 none #F2F7F4 !important;
    border-bottom: 0 none #F2F7F4 !important;
    border-left: 0 none #F2F7F4 !important;
    border-right: 0 none #F2F7F4 !important;
    outline: 0 none #F2F7F4 !important;
    box-shadow: none !important;
    text-decoration: none !important;
  }

  /* ── Icons inside hovered items keep green for contrast ── */
  #root a[href*="?path="]:hover svg,
  #root [data-selected]:not([data-selected="true"]) > a:hover svg {
    color: #00AE35 !important;
    background: transparent !important;
  }

  /* ── Any remaining blue tint backgrounds → green tint ── */
  #root [style*="rgb(235, 243, 255)"],
  #root [style*="#EBF3FF"],
  #root [style*="#ebf3ff"],
  #root [style*="rgb(231, 241, 255)"],
  #root [style*="#E7F1FF"] {
    background-color: #D7EBDF !important;
  }

  /* ── Remove all focus/active/pressed strokes ── */
  #root a[href*="?path="]:focus,
  #root a[href*="?path="]:active,
  #root a[href*="?path="]:focus-visible {
    outline: none !important;
    box-shadow: none !important;
    border: none !important;
  }

  /* ── Kill hover borders ── */
  #root a[href*="?path="]:hover,
  #root a[href*="?path="]:hover *,
  #root div:has(> a[href*="?path="]:hover),
  #root li:has(a[href*="?path="]:hover) {
    border: none !important;
    box-shadow: none !important;
    outline: none !important;
  }
</style>
