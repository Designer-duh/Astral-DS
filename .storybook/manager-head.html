<style>
  /* ═══════════════════════════════════════════════════════════════════
     ASTRAL DS — Storybook Manager Overrides
     ═══════════════════════════════════════════════════════════════════ */

  /* ── Hide "Create a new story" (+) button next to search ── */
  #root button[title*="reate" i],
  #root button[aria-label*="reate" i],
  #root button[title*="ew story" i],
  #root button[aria-label*="ew story" i],
  #root [data-tour*="create" i],
  #root [data-testid*="create" i] {
    display: none !important;
  }

  /* ── Brand logo sizing ── */
  #root img[src*="nav-logo"] {
    height: 60px !important;
    width: auto !important;
    max-width: none !important;
  }

  /* ── SVG icons → brand green by default ── */
  #root svg { color: #00AE35 !important; }

  /* ── Kill ALL strokes/borders/shadows on every sidebar element & state ── */
  #root a,
  #root a *,
  #root a:hover,
  #root a:hover *,
  #root a:focus,
  #root a:focus *,
  #root a:focus-visible,
  #root a:focus-visible *,
  #root a:active,
  #root a:active *,
  #root a::before,
  #root a::after,
  #root a:hover::before,
  #root a:hover::after,
  #root a:focus::before,
  #root a:focus::after,
  #root button,
  #root button:hover,
  #root button:focus,
  #root button:focus-visible,
  #root button:active,
  #root [data-selected],
  #root [data-selected] > *,
  #root [data-selected]:hover,
  #root [data-selected]:hover > *,
  #root [data-selected]:focus,
  #root [data-selected]:focus-visible,
  #root [data-selected="true"],
  #root [data-selected="true"] > *,
  #root [data-selected="true"]:hover,
  #root [data-selected="true"]:hover > *,
  #root [data-selected="true"]:focus,
  #root [data-selected="true"]:focus-visible,
  #root li,
  #root li:hover,
  #root li > * {
    outline: 0 none transparent !important;
    outline-offset: 0 !important;
    box-shadow: none !important;
    border: 0 none transparent !important;
    border-top: 0 none transparent !important;
    border-bottom: 0 none transparent !important;
    border-left: 0 none transparent !important;
    border-right: 0 none transparent !important;
    text-decoration: none !important;
    -webkit-tap-highlight-color: transparent !important;
  }

  /* ── Hover on NON-selected items → soft green tint ──
     IMPORTANT: we check data-selected on the PARENT only, never on <a> itself.
     The <a> tag doesn't carry data-selected — the <li>/wrapper does.
     Using a[href*="path="] without parent check causes it to fire inside
     selected items (because the <a> itself lacks the attribute). ── */
  #root [data-selected="false"]:hover,
  #root [data-selected="false"] > a:hover,
  #root [data-selected="false"] a:hover,
  #root [data-item-id]:not([data-selected="true"]):hover,
  #root [data-item-id]:not([data-selected="true"]) > a:hover,
  #root [data-item-id]:not([data-selected="true"]) a:hover {
    background-color: #F2F7F4 !important;
    color: #191919 !important;
    border-radius: 6px !important;
  }
  #root [data-selected="false"] a:hover svg,
  #root [data-item-id]:not([data-selected="true"]) a:hover svg {
    color: #00AE35 !important;
  }

  /* ── Selected state → solid green pill, FROZEN on every state ──
     Note: html body prefix raises specificity above Storybook's Emotion CSS ── */
  html body #root [data-selected="true"],
  html body #root [data-selected="true"]:hover,
  html body #root [data-selected="true"]:focus,
  html body #root [data-selected="true"]:focus-visible,
  html body #root [data-selected="true"]:focus-within,
  html body #root [data-selected="true"]:active,
  html body #root [data-selected="true"] > a,
  html body #root [data-selected="true"] > a:hover,
  html body #root [data-selected="true"] > a:focus,
  html body #root [data-selected="true"] > a:focus-visible,
  html body #root [data-selected="true"] > a:focus-within,
  html body #root [data-selected="true"] > a:active,
  html body #root [data-selected="true"] > a:visited,
  html body #root a[data-selected="true"],
  html body #root a[data-selected="true"]:hover,
  html body #root a[data-selected="true"]:focus,
  html body #root a[data-selected="true"]:focus-visible,
  html body #root a[data-selected="true"]:focus-within,
  html body #root a[data-selected="true"]:active,
  html body #root a[data-selected="true"]:visited,
  html body #root button[data-selected="true"],
  html body #root button[data-selected="true"]:hover {
    background-color: #00AE35 !important;
    background-image: none !important;
    color: #ffffff !important;
    border-radius: 6px !important;
    outline: 0 none transparent !important;
    outline-offset: 0 !important;
    box-shadow: none !important;
    border: 0 none transparent !important;
    text-decoration: none !important;
    -webkit-tap-highlight-color: transparent !important;
  }

  /* ── Kill any Storybook selected-hover inline style override ── */
  html body #root [data-selected="true"]:hover *,
  html body #root [data-selected="true"] > a:hover *,
  html body #root a[data-selected="true"]:hover * {
    color: #ffffff !important;
    background-color: transparent !important;
    background-image: none !important;
    outline: 0 none transparent !important;
    box-shadow: none !important;
    border: 0 none transparent !important;
  }

  /* ── Selected svg icons stay white even on hover ── */
  html body #root [data-selected="true"] svg,
  html body #root [data-selected="true"]:hover svg,
  html body #root [data-selected="true"] > a svg,
  html body #root [data-selected="true"] > a:hover svg,
  html body #root a[data-selected="true"] svg,
  html body #root a[data-selected="true"]:hover svg,
  html body #root [data-selected="true"] svg *,
  html body #root [data-selected="true"]:hover svg * {
    color: #ffffff !important;
    fill: currentColor !important;
  }
  #root [data-selected="true"] svg,
  #root [data-selected="true"] svg *,
  #root a[data-selected="true"] svg,
  #root a[data-selected="true"] svg *,
  #root [data-selected="true"]:hover svg,
  #root a[data-selected="true"]:hover svg {
    color: #ffffff !important;
    fill: currentColor !important;
  }

  /* ── Kill any residual Storybook blue inline tints ── */
  #root [style*="rgb(235, 243, 255)"],
  #root [style*="#EBF3FF"],
  #root [style*="#ebf3ff"],
  #root [style*="rgb(231, 241, 255)"],
  #root [style*="#E7F1FF"] {
    background-color: #F2F7F4 !important;
  }
</style>
