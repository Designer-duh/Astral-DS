<style>
  /* ═══════════════════════════════════════════════════════════════════
     ASTRAL DS — Storybook Manager Overrides
     ═══════════════════════════════════════════════════════════════════ */

  /* ── Brand logo sizing ── */
  #root img[src*="nav-logo"] {
    height: 60px !important;
    width: auto !important;
    max-width: none !important;
  }

  /* ── SVG icons → brand green ── */
  #root svg { color: #00AE35 !important; }
  #root [data-selected="true"] svg,
  #root [data-selected="true"] svg *,
  #root a[data-selected="true"] svg,
  #root a[data-selected="true"] svg * {
    color: #ffffff !important;
    fill: currentColor !important;
  }

  /* ═══════════════════════════════════════════════════════════════════
     NUCLEAR FOCUS/ACTIVE/PRESSED RING KILLER
     Applies to EVERY element inside #root, on EVERY state.
     This must come BEFORE the colored rules below.
     ═══════════════════════════════════════════════════════════════════ */
  #root *,
  #root *::before,
  #root *::after,
  #root *:hover,
  #root *:focus,
  #root *:focus-visible,
  #root *:focus-within,
  #root *:active,
  #root *:target {
    outline: 0 none transparent !important;
    outline-offset: 0 !important;
    outline-width: 0 !important;
    outline-style: none !important;
    outline-color: transparent !important;
    box-shadow: none !important;
    border-color: transparent !important;
    -webkit-tap-highlight-color: transparent !important;
  }

  /* ── Hover ONLY on non-selected sidebar items → soft green tint ── */
  #root a[href*="path="]:not([data-selected="true"]):hover,
  #root [data-selected="false"]:hover > a,
  #root [data-selected]:not([data-selected="true"]):hover > a,
  #root [data-selected]:not([data-selected="true"]) > a:hover {
    background-color: #F2F7F4 !important;
    color: #191919 !important;
    border-radius: 6px !important;
  }
  #root a[href*="path="]:not([data-selected="true"]):hover svg,
  #root [data-selected]:not([data-selected="true"]) > a:hover svg {
    color: #00AE35 !important;
  }

  /* ── Selected state — brand green pill (stays the same on hover/focus/active) ── */
  #root [data-selected="true"] > a,
  #root [data-selected="true"] > a:hover,
  #root [data-selected="true"] > a:focus,
  #root [data-selected="true"] > a:focus-visible,
  #root [data-selected="true"] > a:active,
  #root a[data-selected="true"],
  #root a[data-selected="true"]:hover,
  #root a[data-selected="true"]:focus,
  #root a[data-selected="true"]:focus-visible,
  #root a[data-selected="true"]:active {
    background-color: #00AE35 !important;
    color: #ffffff !important;
    border-radius: 6px !important;
  }

  /* ── Strip inline Storybook blue tints if any slip through ── */
  #root [style*="rgb(235, 243, 255)"],
  #root [style*="#EBF3FF"],
  #root [style*="#ebf3ff"],
  #root [style*="rgb(231, 241, 255)"],
  #root [style*="#E7F1FF"] {
    background-color: #F2F7F4 !important;
  }
</style>
